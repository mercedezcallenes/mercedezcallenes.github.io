<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mercedez Callenes</title>
  <style>
    body {
      margin: 0;
      font-family: "Georgia", serif;
      background: #f7f3eb;
      color: #111;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 36px 30px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 30px;
      margin-bottom: 50px;
    }

    .site-title {
      font-size: 3.1rem;
      line-height: 0.95;
      font-weight: 500;
      letter-spacing: 1px;
      margin: 0;
    }

    nav {
      display: flex;
      gap: 34px;
      flex-wrap: wrap;
      padding-top: 10px;
    }

    nav a {
  text-decoration: none;
  color: #111;
  font-family: "Georgia", serif;
  font-size: 1rem;
  letter-spacing: 0.6px;
}
    nav a:hover {
      text-decoration: underline;
    }

.circle-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 60px 80px;
  justify-items: center;
  align-items: center;
  max-width: 620px;
  margin: 40px auto 70px;
}

    .circle-link {
      text-decoration: none;
      color: #111;
      text-align: center;
    }

    .circle {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      overflow: hidden;
      background: #d9d3cb;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(0,0,0,0.06);
      transition: transform 0.2s ease;
    }

    .circle:hover {
      transform: scale(1.03);
    }

    .circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .circle-label {
  margin-top: 14px;
  font-family: "Georgia", serif;
  font-size: 1.05rem;
  letter-spacing: 0.6px;
  font-weight: 500;
}

    .subtitle {
      text-align: center;
      font-size: 1.1rem;
      margin-top: 10px;
    }

    .subtitle span {
      color: #c96d62;
    }

    @media (max-width: 900px) {
      header {
        flex-direction: column;
      }

      .circle-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 620px) {
      .page {
        padding: 28px 20px 24px;
      }

      .site-title {
        font-size: 2.3rem;
      }

      .circle-grid {
        grid-template-columns: 1fr;
      }

      .circle {
        width: 220px;
        height: 220px;
      }

      nav {
        gap: 18px;
      }
      nav {
  display: flex;
  gap: 28px;
  align-items: flex-start;
}

.nav-stacked {
  display: flex;
  flex-direction: column;
  text-decoration: none;
  color: #111;
  line-height: 1.1;
}

.nav-stacked span {
  font-size: 1rem;
}

.nav-stacked small {
  font-size: 0.8rem;
  color: #666;
}

.nav-stacked:hover small {
  text-decoration: underline;
}
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
    <h1 class="site-title">Mercedez Callenes, PhD</h1>

      <nav>
  <a href="about.html">About</a>
  <a href="teaching.html">Teaching</a>
  <a href="research.html">Research</a>

  <a href="lads.html">LADS</a>

  <a href="lads-students.html" class="nav-stacked">
    <span>LADS</span>
    <small>Students & Graduates</small>
  </a>

  <a href="contact.html">Contact</a>
</nav>
     
    </header>

    <main>
      <div class="circle-grid">
        <a class="circle-link" href="about.html">
          <div class="circle">
            <img src="about.jpg" alt="About">
          </div>
          <div class="circle-label">About</div>
        </a>

        <a class="circle-link" href="teaching.html">
          <div class="circle">
            <img src="teaching.jpg?v=2" alt="Teaching">
          </div>
          <div class="circle-label">Teaching</div>
        </a>

        <a class="circle-link" href="research.html">
          <div class="circle">
            <img src="research.jpg" alt="Research">
          </div>
          <div class="circle-label">Research</div>
        </a>

        <a class="circle-link" href="lads.html">
          <div class="circle">
            <img src="lads.jpg" alt="LADS">
          </div>
          <div class="circle-label">LADS</div>
        </a>

        
      </div>

      <p class="subtitle">
        Professor, scholar, and director of <span>Latin American Development Studies</span>.
      </p>
    </main>
  </div>
</body>
</html>
