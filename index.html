<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mercedez Callenes</title>
  <style>
    body {
      margin: 0;
      font-family: "Georgia", serif;
      background: #f3f1ee;
      color: #111;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 36px 30px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 30px;
      margin-bottom: 50px;
    }

    .site-title {
      font-size: 3.1rem;
      line-height: 0.95;
      font-weight: 500;
      letter-spacing: 1px;
      margin: 0;
    }

    nav {
      display: flex;
      gap: 34px;
      flex-wrap: wrap;
      padding-top: 10px;
    }

    nav a {
      text-decoration: none;
      color: #111;
      font-family: Arial, sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.5px;
    }

    nav a:hover {
      text-decoration: underline;
    }

    .circle-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 34px;
      justify-items: center;
      align-items: center;
      max-width: 760px;
      margin: 40px auto 70px;
    }

    .circle-link {
      text-decoration: none;
      color: #111;
      text-align: center;
    }

    .circle {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      overflow: hidden;
      background: #d9d3cb;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(0,0,0,0.06);
      transition: transform 0.2s ease;
    }

    .circle:hover {
      transform: scale(1.03);
    }

    .circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .circle-label {
      margin-top: 14px;
      font-family: Arial, sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.4px;
    }

    .subtitle {
      text-align: center;
      font-size: 1.1rem;
      margin-top: 10px;
    }

    .subtitle span {
      color: #c96d62;
    }

    @media (max-width: 900px) {
      header {
        flex-direction: column;
      }

      .circle-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 620px) {
      .page {
        padding: 28px 20px 24px;
      }

      .site-title {
        font-size: 2.3rem;
      }

      .circle-grid {
        grid-template-columns: 1fr;
      }

      .circle {
        width: 220px;
        height: 220px;
      }

      nav {
        gap: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
    <h1 class="site-title">Mercedez Callenes, PhD</h1>

      
      <nav>
  <a href="about.html">About</a>
  <a href="teaching.html">Teaching</a>
  <a href="research.html">Research</a>
  <a href="lads.html">LADS</a>
  <a href="cv.pdf" target="_blank">CV</a>
  <a href="contact.html">Contact</a>
</nav>
    </header>

    <main>
      <div class="circle-grid">
        <a class="circle-link" href="about.html">
          <div class="circle">
            <img src=about.jpg" alt="About">
          </div>
          <div class="circle-label">About</div>
        </a>

        <a class="circle-link" href="teaching.html">
          <div class="circle">
            <img src="teaching.jpg?v=2" alt="Teaching">
          </div>
          <div class="circle-label">Teaching</div>
        </a>

        <a class="circle-link" href="research.html">
          <div class="circle">
            <img src="research.jpg" alt="Research">
          </div>
          <div class="circle-label">Research</div>
        </a>

        <a class="circle-link" href="lads.html">
          <div class="circle">
            <img src="lads.jpg" alt="LADS">
          </div>
          <div class="circle-label">LADS</div>
        </a>
<a class="circle-link" href="cv.pdf" target="_blank">
  <div class="circle">
    <img src="cv.jpg" alt="CV">
  </div>
  <div class="circle-label">CV</div>
</a>
        <a class="circle-link" href="contact.html">
          <div class="circle">
            <img src="contact.jpg" alt="Contact">
          </div>
          <div class="circle-label">Contact</div>
        </a>
      </div>

      <p class="subtitle">
        Professor, scholar, and director of <span>Latin American Development Studies</span>.
      </p>
    </main>
  </div>
</body>
</html>
